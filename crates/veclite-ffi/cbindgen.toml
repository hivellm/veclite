# cbindgen config for the VecLite C ABI header (SPEC-008 FFI-006). The header is
# generated from the crate's `extern "C"` surface and shipped with the release
# artifacts (phase4e). The committed golden-file drift test is phase4g.
language = "C"
pragma_once = true
include_guard = "VECLITE_H"
cpp_compat = true
tab_width = 4
style = "type"
documentation = true
documentation_style = "doxy"

header = """
/* VecLite C ABI (SPEC-008) — the single-file embedded vector database.
 *
 * Link against libveclite.{so,dylib} / veclite.dll (or the static libveclite.a)
 * plus this header. ABI is additive-only within a major version; gate loaders
 * on vl_abi_version(). No Rust toolchain is required to use the prebuilt
 * library. */
"""

autogen_warning = "/* Generated by cbindgen. Do not edit by hand — regenerate from crates/veclite-ffi. */"

[export]
prefix = ""

[fn]
sort_by = "None"

[enum]
prefix_with_name = false

[parse]
parse_deps = false
