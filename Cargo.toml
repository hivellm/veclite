[workspace]
resolver = "2"
members = ["crates/veclite"]

[workspace.package]
version = "0.1.0"
edition = "2024"
# Own MSRV (REL-002, ADR-0001): 1.85 is the edition-2024 floor.
rust-version = "1.85"
license = "Apache-2.0"
repository = "https://github.com/hivellm/veclite"

[workspace.dependencies]
thiserror = "2.0"
dashmap = "6.1"
parking_lot = "0.12"
serde_json = "1.0"
proptest = "1.6"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
