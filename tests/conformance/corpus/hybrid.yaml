suite: hybrid
# Dense lane: doc at vector [k] sits at distance k from the query [0.0], so the
# dense ranking is the insertion order. Sparse lane: a single shared term whose
# weight descends by rank. RRF fusion is pure rank-based (SPEC-007 HYB-020).
cases:
  - id: conf-hybrid-balanced
    desc: alpha 0.5 fuses dense and sparse ranks equally (SPEC-007 §fusion)
    mode: both
    steps:
      - op: create_collection
        args: { name: c, dimension: 1, metric: euclidean, quantization_bits: 0 }
      - op: upsert_batch
        args:
          collection: c
          points:
            - { id: a, vector: [1.0] }
            - { id: b, vector: [2.0] }
            - { id: c, vector: [3.0], sparse: { indices: [0], values: [4.0] } }
            - { id: d, vector: [4.0], sparse: { indices: [0], values: [3.0] } }
            - { id: e, vector: [5.0], sparse: { indices: [0], values: [2.0] } }
            - { id: f, vector: [6.0], sparse: { indices: [0], values: [1.0] } }
      - op: hybrid_search
        args:
          collection: c
          dense: [0.0]
          sparse: { indices: [0], values: [1.0] }
          alpha: 0.5
          rrf_k: 60.0
          limit: 6
        expect:
          ids: [c, d, e, f, a, b]

  - id: conf-hybrid-sparse-heavy
    desc: alpha 0.1 lets the sparse lane dominate the ordering
    mode: both
    steps:
      - op: create_collection
        args: { name: c, dimension: 1, metric: euclidean, quantization_bits: 0 }
      - op: upsert_batch
        args:
          collection: c
          points:
            - { id: x, vector: [1.0], sparse: { indices: [0], values: [1.0] } }
            - { id: y, vector: [2.0], sparse: { indices: [0], values: [2.0] } }
            - { id: z, vector: [3.0], sparse: { indices: [0], values: [3.0] } }
      - op: hybrid_search
        args:
          collection: c
          dense: [0.0]
          sparse: { indices: [0], values: [1.0] }
          alpha: 0.1
          rrf_k: 60.0
          limit: 3
        expect:
          ids: [z, y, x]

  - id: conf-hybrid-dense-heavy
    desc: alpha 0.9 lets the dense lane dominate the ordering
    mode: both
    steps:
      - op: create_collection
        args: { name: c, dimension: 1, metric: euclidean, quantization_bits: 0 }
      - op: upsert_batch
        args:
          collection: c
          points:
            - { id: x, vector: [1.0], sparse: { indices: [0], values: [1.0] } }
            - { id: y, vector: [2.0], sparse: { indices: [0], values: [2.0] } }
            - { id: z, vector: [3.0], sparse: { indices: [0], values: [3.0] } }
      - op: hybrid_search
        args:
          collection: c
          dense: [0.0]
          sparse: { indices: [0], values: [1.0] }
          alpha: 0.9
          rrf_k: 60.0
          limit: 3
        expect:
          ids: [x, y, z]
