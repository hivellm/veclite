name: VecLite Release

# One reusable release workflow (SPEC-016 REL-012): build the full artifact
# matrix, run binding conformance on every artifact, then publish everything
# atomically — a failed build or conformance leg aborts the whole release
# because the `gate` and `publish-*` jobs `needs:` every prior leg, so nothing
# is ever published from a partially-green run (PRD risk mitigation).
#
# Triggers:
#   * push tag `v*`      → real release to PyPI + npm `latest` + crates.io.
#   * workflow_dispatch  → dry run to TestPyPI + npm dist-tag `next` (REL-016,
#     SPEC-016 acceptance 2), the G4/G5 rehearsal before the real 1.0.0.
#
# NOTE: GitHub Actions is currently disabled for this repo (CI budget). This
# file is the ready-to-enable release pipeline; the crates.io/PyPI/npm tokens
# are wired as repo secrets when publishing is turned on.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        type: choice
        default: test
        options: [ test, prod ]

env:
  CARGO_TERM_COLOR: always
  # `test` for a manual dry run; `prod` only for a real tag push.
  TARGET: ${{ github.event_name == 'push' && 'prod' || inputs.target }}

jobs:
  # ── Build + conformance: PyPI wheels ───────────────────────────────────────
  wheels:
    name: Wheel ${{ matrix.target }} ${{ matrix.manylinux || matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64,  manylinux: auto,          native: true  }
          - { os: ubuntu-latest,  target: x86_64,  manylinux: musllinux_1_2, native: false }
          - { os: ubuntu-latest,  target: aarch64, manylinux: auto,          native: false }
          - { os: ubuntu-latest,  target: aarch64, manylinux: musllinux_1_2, native: false }
          - { os: macos-13,       target: x86_64,  native: true }
          - { os: macos-14,       target: aarch64, native: true }
          - { os: windows-latest, target: x64,     native: true }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist -m crates/veclite-py/Cargo.toml
      - name: Conformance corpus on the built wheel (gate G4)
        if: matrix.native
        shell: bash
        run: |
          python -m pip install --upgrade pip pyyaml
          python -m pip install --no-index --find-links dist veclite
          python tests/conformance/runners/python/run.py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-${{ matrix.manylinux || matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/veclite-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ── Build + conformance: npm napi prebuilds ────────────────────────────────
  node-prebuilds:
    name: Node prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  native: true  }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, native: false }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl, native: false }
          - { os: macos-13,       target: x86_64-apple-darwin,       native: true }
          - { os: macos-14,       target: aarch64-apple-darwin,      native: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    native: true }
    defaults:
      run:
        working-directory: crates/veclite-node
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npx napi build --platform --release --target ${{ matrix.target }}
      - name: Conformance corpus on the built addon (gate G4)
        if: matrix.native
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          npm --prefix tests/conformance/runners/node ci
          node --expose-gc tests/conformance/runners/node/run.mjs
        env:
          VECLITE_NODE: ${{ github.workspace }}/crates/veclite-node/veclite.js
      - uses: actions/upload-artifact@v4
        with:
          name: node-prebuild-${{ matrix.target }}
          path: crates/veclite-node/*.node
          if-no-files-found: error

  # ── Atomic gate: every build + conformance leg must be green ───────────────
  gate:
    name: Release gate (all legs green)
    needs: [ wheels, sdist, node-prebuilds ]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All artifact + conformance legs passed — release may publish."

  # ── Publish: PyPI (or TestPyPI on a dry run) ───────────────────────────────
  publish-python:
    name: Publish Python (${{ needs.gate.result }})
    needs: [ gate ]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install twine
      - name: Upload to PyPI / TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.TARGET == 'prod' && secrets.PYPI_TOKEN || secrets.TEST_PYPI_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ env.TARGET == 'prod' && 'https://upload.pypi.org/legacy/' || 'https://test.pypi.org/legacy/' }}
        run: twine upload --non-interactive dist/*

  # ── Publish: npm (dist-tag `next` on a dry run, `latest` on a tag) ─────────
  publish-npm:
    name: Publish npm (${{ needs.gate.result }})
    needs: [ gate ]
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: crates/veclite-node
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          pattern: 'node-prebuild-*'
          path: crates/veclite-node/artifacts
      - name: Assemble per-platform packages
        run: npx napi create-npm-dirs && npx napi artifacts --dir artifacts
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag ${{ env.TARGET == 'prod' && 'latest' || 'next' }} --access public

  # ── Publish: crates.io (source, real releases only) ────────────────────────
  publish-crates:
    name: Publish crates.io
    if: github.event_name == 'push'
    needs: [ gate ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish veclite, veclite-ffi, veclite-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: cargo publish -p veclite
