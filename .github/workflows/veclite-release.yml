name: VecLite Release

# One reusable release workflow (SPEC-016 REL-012): build the full artifact
# matrix, run binding conformance on every artifact, then publish everything
# atomically — a failed build or conformance leg aborts the whole release
# because the `gate` and `publish-*` jobs `needs:` every prior leg, so nothing
# is ever published from a partially-green run (PRD risk mitigation).
#
# Triggers:
#   * push tag `v*`      → real release to PyPI + npm `latest` + crates.io.
#   * workflow_dispatch  → dry run to TestPyPI + npm dist-tag `next` (REL-016,
#     SPEC-016 acceptance 2), the G4/G5 rehearsal before the real 1.0.0.
#
# NOTE: GitHub Actions is currently disabled for this repo (CI budget). This
# file is the ready-to-enable release pipeline; the crates.io/PyPI/npm tokens
# are wired as repo secrets when publishing is turned on.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        type: choice
        default: test
        options: [ test, prod ]

env:
  CARGO_TERM_COLOR: always
  # `test` for a manual dry run; `prod` only for a real tag push.
  TARGET: ${{ github.event_name == 'push' && 'prod' || inputs.target }}

jobs:
  # ── Build + conformance: PyPI wheels ───────────────────────────────────────
  wheels:
    name: Wheel ${{ matrix.target }} ${{ matrix.manylinux || matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64,  manylinux: auto,          native: true  }
          - { os: ubuntu-latest,  target: x86_64,  manylinux: musllinux_1_2, native: false }
          - { os: ubuntu-latest,  target: aarch64, manylinux: auto,          native: false }
          - { os: ubuntu-latest,  target: aarch64, manylinux: musllinux_1_2, native: false }
          - { os: macos-13,       target: x86_64,  native: true }
          - { os: macos-14,       target: aarch64, native: true }
          - { os: windows-latest, target: x64,     native: true }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist -m crates/veclite-py/Cargo.toml
      - name: Conformance corpus on the built wheel (gate G4)
        if: matrix.native
        shell: bash
        run: |
          python -m pip install --upgrade pip pyyaml
          python -m pip install --no-index --find-links dist veclite
          python tests/conformance/runners/python/run.py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-${{ matrix.manylinux || matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/veclite-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ── Build + conformance: npm napi prebuilds ────────────────────────────────
  node-prebuilds:
    name: Node prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  native: true  }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, native: false }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl, native: false }
          - { os: macos-13,       target: x86_64-apple-darwin,       native: true }
          - { os: macos-14,       target: aarch64-apple-darwin,      native: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    native: true }
    defaults:
      run:
        working-directory: crates/veclite-node
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npx napi build --platform --release --target ${{ matrix.target }}
      - name: Conformance corpus on the built addon (gate G4)
        if: matrix.native
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          npm --prefix tests/conformance/runners/node ci
          node --expose-gc tests/conformance/runners/node/run.mjs
        env:
          VECLITE_NODE: ${{ github.workspace }}/crates/veclite-node/veclite.js
      - uses: actions/upload-artifact@v4
        with:
          name: node-prebuild-${{ matrix.target }}
          path: crates/veclite-node/*.node
          if-no-files-found: error

  # ── Raw C ABI shared/static libraries (SPEC-008 FFI-030, phase4e) ──────────
  # Builds veclite-ffi as cdylib + staticlib for the FR-66 native matrix, sets
  # SONAME / install_name / DLL base name, renames the Rust `veclite_ffi.*`
  # output to the shipped `veclite.*` names, generates the cbindgen header, and
  # bundles {shared, static, veclite.h, LICENSE, SHA256SUMS} per target.
  ffi-libs:
    name: FFI libs ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   cross: true,  ext: so,    stem: libveclite }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,  cross: true,  ext: so,    stem: libveclite }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  cross: true,  ext: so,    stem: libveclite }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl, cross: true,  ext: so,    stem: libveclite }
          - { os: macos-13,       target: x86_64-apple-darwin,        cross: false, ext: dylib, stem: libveclite }
          - { os: macos-14,       target: aarch64-apple-darwin,       cross: false, ext: dylib, stem: libveclite }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     cross: false, ext: dll,   stem: veclite }
          - { os: windows-latest, target: aarch64-pc-windows-msvc,    cross: false, ext: dll,   stem: veclite }
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cbindgen
      # Linux cross targets: a C toolchain + linker for the target, so normal
      # `cargo build --target` works and RUSTFLAGS (SONAME) are honored.
      - name: Set up cross toolchain (Linux)
        if: matrix.cross
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      # Windows: put cl/lib/dumpbin on PATH so the import library can be
      # regenerated to reference the shipped veclite.dll name.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.target == 'aarch64-pc-windows-msvc' && 'amd64_arm64' || 'amd64' }}
      - name: Generate the C header
        run: cbindgen --config crates/veclite-ffi/cbindgen.toml --crate veclite-ffi --output veclite.h
      - name: Build cdylib + staticlib
        shell: bash
        env:
          # SONAME (Linux) / install_name (macOS) embed the *shipped* name so a
          # consumer's `-lveclite` resolves the runtime dependency correctly.
          RUSTFLAGS: >-
            ${{ startsWith(matrix.target, 'aarch64-apple') && '-C link-arg=-Wl,-install_name,@rpath/libveclite.dylib'
             || startsWith(matrix.target, 'x86_64-apple') && '-C link-arg=-Wl,-install_name,@rpath/libveclite.dylib'
             || contains(matrix.target, 'linux') && '-C link-arg=-Wl,-soname,libveclite.so'
             || '' }}
        run: cargo build -p hivellm-veclite-ffi --release --target ${{ matrix.target }}
      - name: Assemble the bundle (rename to the shipped names)
        shell: bash
        run: |
          set -euo pipefail
          t="${{ matrix.target }}"
          out="target/$t/release"
          bundle="veclite-ffi-$t"
          mkdir -p "$bundle"
          cp LICENSE veclite.h "$bundle/"
          if [[ "$t" == *windows* ]]; then
            cp "$out/veclite_ffi.dll" "$bundle/veclite.dll"
            cp "$out/veclite_ffi.lib" "$bundle/veclite.lib"          # static lib
            # Regenerate the import lib so it references veclite.dll (the Rust
            # one references veclite_ffi.dll — the loader would miss it).
            machine="${{ matrix.target == 'aarch64-pc-windows-msvc' && 'arm64' || 'x64' }}"
            dumpbin //exports "$bundle/veclite.dll" \
              | awk 'BEGIN{print "LIBRARY veclite"; print "EXPORTS"} /^ +[0-9]+ +[0-9A-Fa-f]+ +[0-9A-Fa-f]+ +vl_/{print "    "$4}' \
              > "$bundle/veclite.def"
            lib //nologo //def:"$bundle/veclite.def" //out:"$bundle/veclite.dll.lib" //machine:$machine
            rm -f "$bundle/veclite.def" "$bundle/veclite.exp"
          else
            cp "$out/${{ matrix.stem }}_ffi.${{ matrix.ext }}" "$bundle/${{ matrix.stem }}.${{ matrix.ext }}"
            cp "$out/libveclite_ffi.a"                          "$bundle/libveclite.a"
          fi
          # Checksums over the bundle contents (portable: shasum on macOS).
          ( cd "$bundle" && (command -v sha256sum >/dev/null && sha256sum * || shasum -a 256 *) > SHA256SUMS )
          tar czf "$bundle.tar.gz" "$bundle"
      - uses: actions/upload-artifact@v4
        with:
          name: ffi-libs-${{ matrix.target }}
          path: veclite-ffi-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  # macOS universal2 dylib (x86_64 + arm64) via lipo (SPEC-016 §3).
  ffi-universal-macos:
    name: FFI libs macOS universal2
    needs: [ ffi-libs ]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: 'ffi-libs-*apple-darwin'
          path: dl
      - name: lipo the two dylibs into one universal2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p x64 arm64 universal
          tar xzf dl/ffi-libs-x86_64-apple-darwin/veclite-ffi-x86_64-apple-darwin.tar.gz -C x64 --strip-components=1
          tar xzf dl/ffi-libs-aarch64-apple-darwin/veclite-ffi-aarch64-apple-darwin.tar.gz -C arm64 --strip-components=1
          cp x64/veclite.h x64/LICENSE universal/
          lipo -create x64/libveclite.dylib arm64/libveclite.dylib -output universal/libveclite.dylib
          # The static lib is also universal-able; keep the x64 static as-is is
          # wrong, so lipo the archives too.
          lipo -create x64/libveclite.a arm64/libveclite.a -output universal/libveclite.a
          ( cd universal && shasum -a 256 * > SHA256SUMS )
          tar czf veclite-ffi-universal2-apple-darwin.tar.gz -C universal .
      - uses: actions/upload-artifact@v4
        with:
          name: ffi-libs-universal2-apple-darwin
          path: veclite-ffi-universal2-apple-darwin.tar.gz
          if-no-files-found: error

  # No-toolchain smoke-link (REL-020 for the C ABI): a tiny C program links the
  # shipped library on a Rust-free machine and calls vl_open_memory/vl_db_close.
  ffi-smoke:
    name: FFI smoke-link ${{ matrix.target }}
    needs: [ ffi-libs ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/download-artifact@v4
        with:
          name: ffi-libs-${{ matrix.target }}
          path: dl
      - name: Compile + run the smoke-link (no Rust toolchain)
        shell: bash
        run: |
          set -euo pipefail
          if command -v cargo >/dev/null 2>&1; then echo "::error::cargo present — not a clean link test"; fi
          mkdir -p b && tar xzf dl/veclite-ffi-${{ matrix.target }}.tar.gz -C b --strip-components=1
          bash ffi/smoke.sh b

  # ── Atomic gate: every build + conformance leg must be green ───────────────
  gate:
    name: Release gate (all legs green)
    needs: [ wheels, sdist, node-prebuilds, ffi-libs, ffi-universal-macos, ffi-smoke ]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All artifact + conformance legs passed — release may publish."

  # ── Publish: PyPI (or TestPyPI on a dry run) ───────────────────────────────
  publish-python:
    name: Publish Python (${{ needs.gate.result }})
    needs: [ gate ]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install twine
      - name: Upload to PyPI / TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.TARGET == 'prod' && secrets.PYPI_TOKEN || secrets.TEST_PYPI_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ env.TARGET == 'prod' && 'https://upload.pypi.org/legacy/' || 'https://test.pypi.org/legacy/' }}
        run: twine upload --non-interactive dist/*

  # ── Publish: npm (dist-tag `next` on a dry run, `latest` on a tag) ─────────
  publish-npm:
    name: Publish npm (${{ needs.gate.result }})
    needs: [ gate ]
    runs-on: ubuntu-latest
    environment: release
    # OIDC trusted publishing (no NPM_TOKEN): `id-token: write` lets the runner
    # mint the short-lived token npm exchanges for publish rights. Each package
    # must have this repo + workflow filename + the `release` environment
    # registered as its trusted publisher on npmjs.com.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: crates/veclite-node
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          # Trusted publishing floors at Node 22.14; Node 22 ships npm 10.x, so
          # npm itself is upgraded below to clear the 11.5.1 minimum.
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest
      - uses: actions/download-artifact@v4
        with:
          pattern: 'node-prebuild-*'
          path: crates/veclite-node/artifacts
      - name: Assemble per-platform packages
        run: npx napi create-npm-dirs && npx napi artifacts --dir artifacts
      # `napi prepublish` publishes the six @hivehub/veclite-<triple> platform
      # packages; the root `npm publish` alone would ship a manifest whose
      # optionalDependencies resolve to nothing.
      - name: Publish platform packages
        run: npx napi prepublish -t npm --tag ${{ env.TARGET == 'prod' && 'latest' || 'next' }}
      - name: Publish
        run: npm publish --tag ${{ env.TARGET == 'prod' && 'latest' || 'next' }} --access public

  # ── Publish: crates.io (source, real releases only) ────────────────────────
  publish-crates:
    name: Publish crates.io
    if: github.event_name == 'push'
    needs: [ gate ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish hivellm-veclite, -ffi, -cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        # Dependency order: both siblings depend on the core crate, and
        # crates.io must have indexed it before they can resolve. `--wait` (the
        # default since 1.73) blocks until the index is live, so no manual sleep.
        run: |
          cargo publish -p hivellm-veclite
          cargo publish -p hivellm-veclite-ffi
          cargo publish -p hivellm-veclite-cli

  # ── Publish: raw C ABI libraries → GitHub release (SPEC-008 FFI-030) ────────
  publish-ffi-release:
    name: Publish FFI libraries to the GitHub release
    if: github.event_name == 'push'
    needs: [ gate ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'ffi-libs-*'
          path: ffi
          merge-multiple: true
      - name: Aggregate a top-level SHA256SUMS over every bundle
        shell: bash
        run: (cd ffi && sha256sum *.tar.gz > SHA256SUMS.txt)
      - name: Upload the bundles to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ffi/*.tar.gz
            ffi/SHA256SUMS.txt
          fail_on_unmatched_files: true
