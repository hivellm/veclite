name: VecLite Sanitizers

# Sanitizer gates (SPEC-008 phase4g TST-2.1/2.2). ASan + LeakSanitizer runs
# the C ABI smoke programs — full_smoke.c (whole lifecycle, zero leaks) and
# concurrency.c (one vl_db hammered from 16 threads). TSan runs the crate's
# test suite with an instrumented std (nightly + -Zbuild-std, rustc-linked):
# linking the instrumented staticlib into a clang-linked C main SEGVs in
# __tsan_func_entry regardless of clang/nightly version — see the header of
# tests/c/sanitize.sh. The gate also runs locally on Linux (Docker on Windows)
# via `tests/c/sanitize.sh` / `cargo xtask sanitize`.

on:
  push:
    branches: [ main ]
    paths:
      - 'crates/veclite-ffi/**'
      - 'tests/c/**'
      - '.github/workflows/veclite-sanitizers.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'crates/veclite-ffi/**'
      - 'tests/c/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CC: clang

jobs:
  asan:
    name: ASan + LeakSanitizer (full lifecycle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: sanitize-asan
      - name: ASan + LSan
        run: tests/c/sanitize.sh asan

  tsan:
    name: ThreadSanitizer (instrumented test suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: sanitize-tsan
      - name: TSan
        run: tests/c/sanitize.sh tsan
