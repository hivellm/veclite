name: VecLite Sanitizers

# ASan/LSan + TSan C smoke tests for the C ABI (SPEC-008 phase4g TST-2.1/2.2).
# full_smoke.c runs the whole lifecycle under AddressSanitizer + LeakSanitizer
# (zero leaks); concurrency.c hammers one vl_db from 16 threads under
# ThreadSanitizer (no data races). TSan needs the Rust library instrumented, so
# it uses nightly + -Zbuild-std. The gate also runs locally on Linux (Docker on
# Windows) via `tests/c/sanitize.sh` / `cargo xtask sanitize`.

on:
  push:
    branches: [ main ]
    paths:
      - 'crates/veclite-ffi/**'
      - 'tests/c/**'
      - '.github/workflows/veclite-sanitizers.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'crates/veclite-ffi/**'
      - 'tests/c/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CC: clang

jobs:
  asan:
    name: ASan + LeakSanitizer (full lifecycle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: sanitize-asan
      - name: ASan + LSan
        run: tests/c/sanitize.sh asan

  tsan:
    name: ThreadSanitizer (16-thread concurrency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: sanitize-tsan
      # Ubuntu 24.04 runners default to vm.mmap_rnd_bits=32; TSan's shadow
      # mapping can't cope and the instrumented binary SEGVs on the zero page
      # at startup, before any test runs (a DEADLYSIGNAL storm, no race
      # report). 28 bits is the documented sanitizer-compatible setting.
      - name: Reduce ASLR entropy for TSan
        run: sudo sysctl -w vm.mmap_rnd_bits=28
      - name: TSan
        run: tests/c/sanitize.sh tsan
