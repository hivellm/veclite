name: VecLite Packaging

# Builds the full FR-66 artifact matrix (SPEC-016 §3) — abi3 wheels via maturin
# and per-platform napi prebuilds — and runs the binding conformance corpus
# (SPEC-015 §3, gate G4) against each freshly built artifact on its native host.
# Cross-compiled artifacts (e.g. linux/arm64 on an x64 runner) are built and
# uploaded but their conformance runs on the release workflow's emulated jobs.
#
# NOTE: GitHub Actions is currently disabled for this repo (CI budget); the
# quality gate runs locally via `cargo xtask conformance`, the Python runner,
# and the Node runner. This workflow is kept green-by-construction so it can be
# re-enabled without changes.

on:
  push:
    branches: [ main ]
    paths:
      - 'crates/veclite/**'
      - 'crates/veclite-py/**'
      - 'crates/veclite-node/**'
      - 'tests/conformance/**'
      - '.github/workflows/veclite-packaging.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'crates/veclite-py/**'
      - 'crates/veclite-node/**'
      - 'tests/conformance/**'
      - '.github/workflows/veclite-packaging.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── PyPI: abi3 wheels (maturin) — FR-66 ────────────────────────────────────
  wheels:
    name: Wheel ${{ matrix.target }} ${{ matrix.manylinux || matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64,  manylinux: auto,           native: true  }
          - { os: ubuntu-latest,  target: x86_64,  manylinux: musllinux_1_2,  native: false }
          - { os: ubuntu-latest,  target: aarch64, manylinux: auto,           native: false }
          - { os: ubuntu-latest,  target: aarch64, manylinux: musllinux_1_2,  native: false }
          - { os: macos-13,       target: x86_64,  native: true }
          - { os: macos-14,       target: aarch64, native: true }
          - { os: windows-latest, target: x64,     native: true }
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist -m crates/veclite-py/Cargo.toml

      - name: Conformance corpus on the built wheel (gate G4)
        if: matrix.native
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
          python -m pip install --no-index --find-links dist veclite
          python tests/conformance/runners/python/run.py

      - name: pytest on the built wheel (register_embedder, aio, zero-copy, GIL)
        if: matrix.native
        shell: bash
        run: |
          python -m pip install numpy pytest
          python -m pytest crates/veclite-py/tests -q

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-${{ matrix.manylinux || matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  # ── npm: per-platform napi prebuilds — FR-66 ───────────────────────────────
  node-prebuilds:
    name: Node prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   native: true  }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,  native: false }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  native: false }
          - { os: macos-13,       target: x86_64-apple-darwin,        native: true }
          - { os: macos-14,       target: aarch64-apple-darwin,       native: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     native: true }
    defaults:
      run:
        working-directory: crates/veclite-node
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/veclite-node
          key: node-${{ matrix.target }}

      - name: Install deps
        run: npm ci

      - name: Build napi prebuild
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Behavioral + leak/zero-copy tests (native)
        if: matrix.native
        run: npm test

      - name: Conformance corpus on the built addon — Node (gate G4)
        if: matrix.native
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          npm --prefix tests/conformance/runners/node ci
          node --expose-gc tests/conformance/runners/node/run.mjs
        env:
          VECLITE_NODE: ${{ github.workspace }}/crates/veclite-node/veclite.js

      - name: Set up Bun
        if: matrix.native
        uses: oven-sh/setup-bun@v2

      - name: Conformance corpus on the built addon — Bun (acceptance 1/4)
        if: matrix.native
        shell: bash
        working-directory: ${{ github.workspace }}
        run: bun tests/conformance/runners/node/run.mjs
        env:
          VECLITE_NODE: ${{ github.workspace }}/crates/veclite-node/veclite.js

      - name: Stage the addon into its platform package (publish layout)
        shell: bash
        working-directory: crates/veclite-node
        run: |
          node_file="$(ls veclite.*.node | head -n1)"
          platform="${node_file#veclite.}"; platform="${platform%.node}"
          if [ -d "npm/$platform" ]; then cp "$node_file" "npm/$platform/"; fi

      - uses: actions/upload-artifact@v4
        with:
          name: node-prebuild-${{ matrix.target }}
          path: |
            crates/veclite-node/*.node
            crates/veclite-node/npm/*/
          if-no-files-found: error
